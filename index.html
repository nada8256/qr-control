<!DOCTYPE html>
<html>
<body>
  <h2>Upload Your Face</h2>

  <input type="file" id="fileInput" accept="image/*">

  <p id="status">No image selected</p>

  <!-- 👇 이미지 미리보기 -->
  <img id="preview" width="300" style="display:none; margin-top:10px;">

  <script>
    const ws = new WebSocket("ws://192.168.45.157:9980");

    const input = document.getElementById("fileInput");
    const status = document.getElementById("status");
    const preview = document.getElementById("preview");

    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result;

        // 👇 화면에 이미지 보여주기
        preview.src = base64;
        preview.style.display = "block";

        // 👇 데이터 전송
        const chunkSize = 8000;
        let index = 0;

        while (index < base64.length) {
          const chunk = base64.substring(index, index + chunkSize);
          ws.send("img:" + chunk);
          index += chunkSize;
        }

        ws.send("img:end");

        status.innerText = "Image sent!";
      };

      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
</html>
