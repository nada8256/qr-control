<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: radial-gradient(circle, #111 0%, #000 100%);
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      text-align: center;
      margin: 0;
      overflow: hidden;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
    }

    h2 {
      font-weight: 200;
      letter-spacing: 4px;
      margin-bottom: 40px;
      opacity: 0.85;
    }

    input[type="file"] {
      display: none;
    }

    .upload-btn {
      border: 1px solid rgba(255,255,255,0.6);
      padding: 14px 24px;
      display: inline-block;
      cursor: pointer;
      transition: 0.4s;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .upload-btn:hover {
      background-color: white;
      color: black;
    }

    #preview {
      margin-top: 30px;
      width: 220px;
      opacity: 0;
      border-radius: 12px;
      transition: 1.2s;
      filter: grayscale(30%) contrast(110%);
    }

    #status {
      margin-top: 15px;
      font-size: 11px;
      opacity: 0.5;
      letter-spacing: 2px;
    }

    /* subtle glow effect */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: blur(60px);
      z-index: -1;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">
    <h2>Leave Your Trace</h2>

    <label class="upload-btn">
      Upload Image
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <p id="status">waiting...</p>

    <img id="preview">
  </div>

  <script>
    const ws = new WebSocket("ws://192.168.45.157:9980");

    const input = document.getElementById("fileInput");
    const status = document.getElementById("status");
    const preview = document.getElementById("preview");

    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;

      status.innerText = "recording...";

      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result;

        preview.src = base64;
        preview.style.opacity = "0.8";

        const chunkSize = 8000;
        let index = 0;

        while (index < base64.length) {
          const chunk = base64.substring(index, index + chunkSize);
          ws.send("img:" + chunk);
          index += chunkSize;
        }

        ws.send("img:end");

        status.innerText = "trace recorded";

        setTimeout(() => {
          preview.style.opacity = "0";
          status.innerText = "";
        }, 4000);
      };

      reader.readAsDataURL(file);
    };
  </script>

</body>
</html>
