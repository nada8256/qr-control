<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
    }

    h2 {
      font-weight: 200;
      letter-spacing: 3px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    input[type="file"] {
      display: none;
    }

    .upload-btn {
      border: 1px solid white;
      padding: 12px 20px;
      display: inline-block;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .upload-btn:hover {
      background-color: white;
      color: black;
    }

    #preview {
      margin-top: 30px;
      width: 220px;
      opacity: 0;
      border-radius: 12px;
      transition: 1s;
    }

    #status {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Leave Your Trace</h2>

    <label class="upload-btn">
      Upload Image
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <p id="status">waiting...</p>

    <img id="preview">
  </div>

  <script>
    const ws = new WebSocket("ws://192.168.45.157:9980");

    const input = document.getElementById("fileInput");
    const status = document.getElementById("status");
    const preview = document.getElementById("preview");

    input.onchange = () => {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result;

        // 이미지 보여주기 (fade in)
        preview.src = base64;
        preview.style.opacity = "0.8";

        // 데이터 전송
        const chunkSize = 8000;
        let index = 0;

        while (index < base64.length) {
          const chunk = base64.substring(index, index + chunkSize);
          ws.send("img:" + chunk);
          index += chunkSize;
        }

        ws.send("img:end");

        status.innerText = "trace recorded";

        // 시간 지나면 사라짐 (작품 느낌)
        setTimeout(() => {
          preview.style.opacity = "0";
        }, 4000);
      };

      reader.readAsDataURL(file);
    };
  </script>

</body>
</html>
